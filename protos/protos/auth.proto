syntax = "proto3";

enum UserRole {
  UNKNOWN = 0;
  ADMIN = 1;
  TEACHER = 2;
  STUDENT = 3;
}

message User {
  string id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string phone = 5;
  UserRole role = 6;
  bool is_active = 7;
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string phone = 4;
}

message LoginRequest {
  string identifier = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  User user = 2;
}

service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
}
