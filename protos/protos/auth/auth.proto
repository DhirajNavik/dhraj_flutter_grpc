syntax = "proto3";

package auth;

import "user/user.proto";


message LoginRequest {
  string identifier = 1;
  string password = 2;
}

message RegisterStudentRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string phone = 4;
}

message RegisterTeacherRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string phone = 4;
}

message LoginResponse  {
  user.UserRole role = 1;
  string token = 2;
}

message RegisterResponse {
  string message = 1;
}

service AuthService {
  rpc RegisterStudent(RegisterStudentRequest) returns (RegisterResponse);
  rpc RegisterTeacher(RegisterTeacherRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
}
